<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Precioso degradado naranja CS2 -->
        <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff9838" />
            <stop offset="100%" stop-color="#e05a00" />
        </linearGradient>
    </defs>

    <!-- Fondo Squircle (Llega exactamente a los bordes con 0 margen) -->
    <rect width="512" height="512" rx="140" fill="url(#orangeGrad)" />

    <!-- Grupo del logotipo centrado -->
    <g transform="translate(256, 256)">
        <!-- 1. Mira táctica negra (Crosshair / Target) -->
        <circle r="115" fill="none" stroke="#000000" stroke-width="26" />
        
        <!-- Muescas de la mira (las 4 protuberancias tácticas) -->
        <circle cx="0" cy="-115" r="22" fill="#000000" />
        <circle cx="115" cy="0" r="22" fill="#000000" />
        <circle cx="0" cy="115" r="22" fill="#000000" />
        <circle cx="-115" cy="0" r="22" fill="#000000" />

        <!-- 2. Cartera blanca (Wallet) superpuesta en el centro -->
        <!-- Cuerpo principal de la cartera -->
        <rect x="-75" y="-60" width="150" height="120" rx="24" fill="#ffffff" />
        
        <!-- Línea de la solapa superior -->
        <path d="M -75 -24 L 45 -24 A 12 12 0 0 1 57 -12 L 57 12 A 12 12 0 0 1 45 24 L -75 24" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
        
        <!-- Botón / Broche naranja de la cartera -->
        <circle cx="36" cy="6" r="13" fill="#e05a00" />
    </g>
</svg>
